<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup 2026</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="hero-section">
            <div id="circle" class="circle1"></div>
        <div class="logos-div">
            <img src="./images/fifa-logo.png" class="fifa-logo"> | 
            <img src="./images/tournment-removebg-preview.png" class="tournment-logo">
        </div>
        <div class="text-div">
        <h1 class="main-text">CountDown towards the...</h1>
        <span class="styled-text"> FIFA World Cup 2026</span>
        <img src="./images/line.png" id="line">
        <div id="countdown-div">
            <div id="days-countdown-div" class="countdown-box">
                <span class="countdown-timer" id="days-countdown"></span>
                <span class="time-span-header">Days</span>
            </div>

            <div id="hours-countdown-div" class="countdown-box">
                <span class="countdown-timer" id="hours-countdown"></span>
                <span class="time-span-header">Hours</span>
            </div>

            <div id="minutes-countdown-div" class="countdown-box">
                <span class="countdown-timer" id="minutes-countdown"></span>
                <span class="time-span-header">Minutes</span>
            </div>

            <div id="seconds-countdown-div" class="countdown-box">
                <span class="countdown-timer" id="seconds-countdown"></span>
                <span class="time-span-header">Seconds</span>
            </div>
        </div>
        <footer id="website-footer">Made with ♡ by <span class="footer-name">@Aref</span> 2026 &copy;copyright All Rights Reserved</footer>
    </div>
        <script src="script.js"></script>
</body>
</html>
